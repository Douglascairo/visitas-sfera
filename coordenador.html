<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sfera · Super em Ação · Coordenação</title>
  <link rel="icon" type="image/png" href="img/sfera-logo.png">
  <link rel="apple-touch-icon" href="img/sfera-logo.png">
  <meta name="theme-color" content="#042C53">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .sup-card { background:white; border-radius:12px; padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow); }
    .sup-nome { font-weight:800; font-size:15px; }
    .sup-info { font-size:12px; color:var(--text-light); margin-top:2px; }
    .tipo-dia-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .td-badge-visitas { background:#cfe2ff; color:#084298; }
    .td-badge-escritorio { background:#e2e3e5; color:#383d41; }
    .td-badge-demanda { background:#fff3cd; color:#856404; }
    .rota-loja { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .rota-num { width:24px; height:24px; border-radius:50%; background:var(--sfera); color:white; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .rota-home { width:24px; height:24px; border-radius:50%; background:#28a745; color:white; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .km-badge { background:var(--sfera-light); color:var(--sfera-dark); padding:4px 12px; border-radius:20px; font-size:13px; font-weight:700; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo-img"><img src="img/sfera-logo.png" alt="Sfera"></div>
    <div class="header-title"><strong>Super em Ação</strong><span>Coordenação</span></div>
  </div>
  <div class="header-user">
    <strong>Douglas Cairo</strong>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</div>

<div class="container">

  <div class="tabs">
    <button class="tab-btn active" onclick="mudarTab('visitas')">Visitas</button>
    <button class="tab-btn" onclick="mudarTab('rota')">Rota</button>
    <button class="tab-btn" onclick="mudarTab('metricas')">Métricas</button>
    <button class="tab-btn" onclick="mudarTab('checklists')">Checklists</button>
  </div>

  <!-- ======== TAB: VISITAS ======== -->
  <div id="tab-visitas">
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <select class="form-control" id="filtro-periodo" style="flex:1;" onchange="carregarVisitas()">
        <option value="hoje">Hoje</option>
        <option value="semana">Esta semana</option>
        <option value="mes" selected>Este mês</option>
        <option value="tudo">Tudo</option>
      </select>
      <select class="form-control" id="filtro-sup" style="flex:1;" onchange="carregarVisitas()">
        <option value="">Todas as supervisoras</option>
      </select>
    </div>
    <div id="lista-visitas-coord">
      <div class="loader"><div class="spinner"></div><p>Carregando...</p></div>
    </div>
  </div>

  <!-- ======== TAB: ROTA ======== -->
  <div id="tab-rota" style="display:none">
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <input type="date" id="rota-data" class="form-control" style="flex:1;" onchange="carregarRotas()">
      <select class="form-control" id="rota-sup" style="flex:1;" onchange="carregarRotas()">
        <option value="">Todas as supervisoras</option>
      </select>
    </div>
    <div id="lista-rotas">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ======== TAB: MÉTRICAS ======== -->
  <div id="tab-metricas" style="display:none">
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <select class="form-control" id="met-mes" style="flex:1;" onchange="carregarMetricas()">
        <option value="6">Junho 2026</option>
        <option value="5">Maio 2026</option>
        <option value="4">Abril 2026</option>
        <option value="3">Março 2026</option>
        <option value="2">Fevereiro 2026</option>
        <option value="1">Janeiro 2026</option>
      </select>
      <select class="form-control" id="met-sup" style="flex:1;" onchange="carregarMetricas()">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="metrics-grid" id="metrics-gerais">
      <div class="loader" style="grid-column:span 2"><div class="spinner"></div></div>
    </div>
    <div class="card"><div class="card-title">🌟 Energia média por supervisora</div><div id="chart-energia"></div></div>
    <div class="card"><div class="card-title">📅 Visitas por supervisora</div><div id="chart-visitas-sup"></div></div>
    <div class="card"><div class="card-title">📋 Registros por categoria</div><div id="chart-categorias"></div></div>
    <div class="card"><div class="card-title">🏪 Energia média por loja</div><div id="chart-energia-loja"></div></div>
    <div class="card"><div class="card-title">📅 Dias por tipo (supervisoras)</div><div id="chart-tipo-dia"></div></div>
  </div>

  <!-- ======== TAB: CHECKLISTS ======== -->
  <div id="tab-checklists" style="display:none">
    <button class="btn btn-primary btn-full" onclick="abrirNovoChecklist()" style="margin-bottom:16px;">+ Novo Checklist</button>
    <div id="lista-checklists"><div class="loader"><div class="spinner"></div></div></div>
  </div>

</div>

<!-- MODAL: Detalhes Visita -->
<div id="modal-visita" style="display:none">
  <div class="modal-bg" onclick="fecharModal()">
    <div class="modal-box" onclick="event.stopPropagation()" style="max-height:85vh;overflow-y:auto;">
      <div class="modal-title" id="modal-visita-titulo"></div>
      <div id="modal-visita-body"></div>
      <button class="btn btn-secondary btn-full" onclick="fecharModal()" style="margin-top:12px;">Fechar</button>
    </div>
  </div>
</div>

<!-- MODAL: Novo Checklist -->
<div id="modal-novo-cl" style="display:none">
  <div class="modal-bg" onclick="fecharNovoChecklist()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title">Novo Checklist</div>
      <div class="form-group">
        <label class="form-label">Título</label>
        <input type="text" id="cl-titulo" class="form-control" placeholder="Ex: Checklist de Abertura">
      </div>
      <div class="form-group">
        <label class="form-label">Itens (um por linha)</label>
        <textarea class="form-control" id="cl-itens" rows="8" placeholder="Vitrine organizada e limpa&#10;Etiquetas de preço visíveis&#10;Equipe uniformizada&#10;Provadores organizados"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="fecharNovoChecklist()" style="flex:1">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarNovoChecklist()" style="flex:2">Salvar</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

window.addEventListener('DOMContentLoaded', async()=>{
  const u=sessionStorage.getItem('usuario');
  if(!u||JSON.parse(u).tipo!=='coordenador'){window.location.href='index.html';return;}
  document.getElementById('filtro-data').value=new Date().toISOString().split('T')[0];
  document.getElementById('rota-data').value=new Date().toISOString().split('T')[0];

// ==============================
// TABS
// ==============================
function mudarTab(tab) {
  ['visitas','rota','metricas','checklists'].forEach((t,i)=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active',t===tab);
  });
  if(tab==='metricas') carregarMetricas();
  if(tab==='checklists') carregarChecklists();
  if(tab==='rota') carregarRotas();
}

// ==============================
// SUPERVISORAS
// ==============================
async function carregarSupervisoras() {
  const {data}=await db.from('supervisoras').select('*').eq('ativo',true).order('nome');
  supervisoras=data||[];
  ['filtro-sup','rota-sup','met-sup'].forEach(selId=>{
    const sel=document.getElementById(selId);
    data.forEach(s=>{const opt=document.createElement('option');opt.value=s.id;opt.textContent=s.nome;sel.appendChild(opt);});
  });
}

// ==============================
// VISITAS (agrupadas por loja)
// ==============================
async function carregarVisitas() {
  const el=document.getElementById('lista-visitas-coord');
  el.innerHTML='<div class="loader"><div class="spinner"></div></div>';
  const periodo=document.getElementById('filtro-periodo').value;
  const supId=document.getElementById('filtro-sup').value;
  const hoje=new Date();

  let q=db.from('visitas').select('*,lojas(id,nome,cidade,estado),supervisoras(nome)').order('data_visita',{ascending:false});

  if(periodo==='hoje') q=q.eq('data_visita',hoje.toISOString().split('T')[0]);
  else if(periodo==='semana'){const d=new Date(hoje);d.setDate(d.getDate()-7);q=q.gte('data_visita',d.toISOString().split('T')[0]);}
  else if(periodo==='mes') q=q.gte('data_visita',`${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-01`);

  if(supId) q=q.eq('supervisora_id',supId);

  const {data:visitas}=await q;
  if(!visitas||visitas.length===0){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>Nenhuma visita encontrada</p></div>';return;}

  // Agrupar por loja
  const porLoja={};
  visitas.forEach(v=>{
    const lojaId=v.lojas?.id||v.loja_id;
    const lojaNome=v.lojas?.nome||'—';
    if(!porLoja[lojaId]) porLoja[lojaId]={nome:lojaNome,cidade:v.lojas?.cidade,estado:v.lojas?.estado,visitas:[],energias:[],supervisoras:new Set()};
    porLoja[lojaId].visitas.push(v);
    if(v.energia_time) porLoja[lojaId].energias.push(v.energia_time);
    if(v.supervisoras?.nome) porLoja[lojaId].supervisoras.add(v.supervisoras.nome.split(' ')[1]||v.supervisoras.nome.split(' ')[0]);
  });

  // Ordenar por qtd de visitas (maior primeiro)
  const sorted=Object.entries(porLoja).sort((a,b)=>b[1].visitas.length-a[1].visitas.length);

  el.innerHTML=sorted.map(([lojaId,loja])=>{
    const mediaE=loja.energias.length>0?(loja.energias.reduce((a,b)=>a+b,0)/loja.energias.length):0;
    const emojiMedia=ENERGIA_INFO[Math.round(mediaE)]?.emoji||'—';
    const abertas=loja.visitas.filter(v=>v.status==='aberta').length;
    const sups=[...loja.supervisoras].join(', ');
    return `<div class="visita-card" onclick="verDetalhesPorLoja('${lojaId}','${encodeURIComponent(JSON.stringify(loja.visitas.map(v=>v.id)))}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;">
          <div class="visita-card-loja">${loja.nome}</div>
          <div class="visita-card-info">${loja.cidade||''}/${loja.estado||''} · ${sups}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:22px;">${emojiMedia}</div>
          <div style="font-size:11px;color:var(--text-light);">E. média</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <span style="background:var(--sfera-light);color:var(--sfera-dark);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;">${loja.visitas.length} visita${loja.visitas.length!==1?'s':''}</span>
        ${abertas>0?`<span class="visita-card-status status-aberta">● ${abertas} em andamento</span>`:''}
      </div>
    </div>`;
  }).join('');
}

async function verDetalhesPorLoja(lojaId, idsEncoded) {
  const ids=JSON.parse(decodeURIComponent(idsEncoded));

  // Buscar todas as visitas da loja no período
  const {data:visitas}=await db.from('visitas').select('*,supervisoras(nome),lojas(nome,cidade,estado)').in('id',ids).order('data_visita',{ascending:false});

  // Buscar todos os registros de uma vez
  const {data:todosRegs}=await db.from('registros_visita').select('*').in('visita_id',ids).order('created_at');
  const {data:todasRevisoes}=await db.from('plano_acao_revisao').select('*,registros_visita(descricao)').in('visita_revisao_id',ids);

  const loja=visitas?.[0]?.lojas;
  document.getElementById('modal-visita-titulo').textContent=`${loja?.nome||'Loja'} · ${visitas?.length} visita${visitas?.length!==1?'s':''}`;

  let html='';
  (visitas||[]).forEach((v,idx)=>{
    const info=ENERGIA_INFO[v.energia_time];
    const regs=(todosRegs||[]).filter(r=>r.visita_id===v.id);
    const revisoes=(todasRevisoes||[]).filter(r=>r.visita_revisao_id===v.id);
    const catGroups={};
    regs.forEach(r=>{if(!catGroups[r.categoria])catGroups[r.categoria]=[];catGroups[r.categoria].push(r);});

    html+=`<div style="border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div>
          <div style="font-weight:800;font-size:15px;">${formatData(v.data_visita)}</div>
          <div style="font-size:12px;color:var(--text-light);">${v.supervisoras?.nome} · ${formatHora(v.hora_inicio)}${v.hora_fim?' → '+formatHora(v.hora_fim):''}</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:28px;">${info?.emoji||'—'}</div>
          <div style="font-size:10px;color:${info?.cor};font-weight:700;">${info?.label||''}</div>
        </div>
      </div>`;

    // Revisão do plano
    if(revisoes.length>0){
      html+=`<div style="background:#fff3cd;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:12px;">
        <strong style="color:#856404;">🎯 Revisão do plano anterior</strong><br>
        ${revisoes.map(r=>{const ic=r.status==='concluido'?'✅':r.status==='andamento'?'🔄':'❌';return `${ic} ${r.registros_visita?.descricao||'—'}`;}).join('<br>')}
      </div>`;
    }

    if(Object.keys(catGroups).length===0){
      html+='<p style="color:var(--text-light);font-size:13px;">Nenhum registro.</p>';
    } else {
      Object.entries(catGroups).forEach(([cat,items])=>{
        html+=`<div style="font-size:11px;font-weight:700;color:var(--sfera-dark);margin:8px 0 4px;text-transform:uppercase;">${CAT_INFO[cat]||cat}</div>`;
        items.forEach(r=>{
          html+=`<div style="padding:6px 8px;background:var(--bg);border-radius:6px;font-size:13px;margin-bottom:4px;">• ${r.descricao}`;
          if(r.media_url) html+=` <a href="${r.media_url}" target="_blank" style="color:var(--sfera);">📎</a>`;
          html+='</div>';
        });
      });
    }
    if(v.observacao_geral) html+=`<div style="font-size:12px;color:var(--text-light);margin-top:8px;font-style:italic;">💬 ${v.observacao_geral}</div>`;
    html+='</div>';
  });

  document.getElementById('modal-visita-body').innerHTML=html||'<p>Sem dados.</p>';
  document.getElementById('modal-visita').style.display='';
}
function fecharModal(){document.getElementById('modal-visita').style.display='none';}

// ==============================
// ROTA
// ==============================
async function carregarRotas() {
  const el=document.getElementById('lista-rotas');
  el.innerHTML='<div class="loader"><div class="spinner"></div></div>';
  const data=document.getElementById('rota-data').value;
  const supIdFiltro=document.getElementById('rota-sup').value;

  // Carregar tipo de dia das supervisoras
  let qDias=db.from('dias_supervisora').select('*,supervisoras(nome,nome_curto,endereco_residencial,cidade_residencial)').eq('data',data);
  if(supIdFiltro) qDias=qDias.eq('supervisora_id',supIdFiltro);
  const {data:dias}=await qDias;

  // Carregar visitas do dia
  let qVis=db.from('visitas').select('*,lojas(nome,cidade,estado,codigo)').eq('data_visita',data).eq('status','encerrada').order('hora_inicio');
  if(supIdFiltro) qVis=qVis.eq('supervisora_id',supIdFiltro);
  const {data:visitas}=await qVis;

  // Agrupar visitas por supervisora
  const porSup={};
  (visitas||[]).forEach(v=>{
    if(!porSup[v.supervisora_id]) porSup[v.supervisora_id]=[];
    porSup[v.supervisora_id].push(v);
  });

  // Supervisoras sem visitas mas com tipo de dia registrado
  const supsSemVisita=(dias||[]).filter(d=>!porSup[d.supervisora_id]);

  let html='';

  // Supervisoras com visitas
  for(const [supId,visits] of Object.entries(porSup)) {
    const sup=supervisoras.find(s=>s.id===supId);
    if(!sup) continue;
    const diaInfo=(dias||[]).find(d=>d.supervisora_id===supId);
    const homeCoordsKey=sup.nome_curto;
    const homeCoords=HOMES[homeCoordsKey];

    // Calcular km total
    let kmTotal=0;
    const pontos=[];
    if(homeCoords) pontos.push({...homeCoords,tipo:'home'});
    visits.forEach(v=>{
      const c=LOJA_COORDS[v.lojas?.codigo];
      if(c) pontos.push({...c,tipo:'loja',nome:v.lojas?.nome,hora:formatHora(v.hora_inicio)});
    });
    if(homeCoords&&pontos.length>1) pontos.push({...homeCoords,tipo:'home-ret',nome:'Casa (retorno)'});

    for(let i=0;i<pontos.length-1;i++) {
      kmTotal+=haversine(pontos[i].lat,pontos[i].lng,pontos[i+1].lat,pontos[i+1].lng)*1.35;
    }

    // Google Maps URL
    const mapsUrl=gerarMapsUrl(sup,visits);

    const tipoBadge=diaInfo?`<span class="tipo-dia-badge ${TIPO_DIA[diaInfo.tipo]?.badge}">${TIPO_DIA[diaInfo.tipo]?.label}</span>`:'';

    html+=`<div class="card" style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div>
          <div class="sup-nome">${sup.nome}</div>
          <div class="sup-info">${sup.endereco_residencial||'Endereço não cadastrado'}</div>
          <div style="margin-top:6px;">${tipoBadge}</div>
        </div>
        <span class="km-badge">~${kmTotal.toFixed(0)} km</span>
      </div>
      <div style="margin-bottom:12px;">
        <div class="rota-loja"><div class="rota-home">🏠</div><div><strong>${homeCoords?.nome||'Casa'}</strong><div style="font-size:11px;color:var(--text-light);">${sup.cidade_residencial||''}</div></div></div>
        ${visits.map((v,i)=>`
          <div class="rota-loja">
            <div class="rota-num">${i+1}</div>
            <div style="flex:1;"><strong>${v.lojas?.nome}</strong><div style="font-size:11px;color:var(--text-light);">${v.lojas?.cidade} · ${formatHora(v.hora_inicio)}${v.hora_fim?' → '+formatHora(v.hora_fim):''}</div></div>
            <span style="font-size:18px;">${ENERGIA_INFO[v.energia_time]?.emoji||''}</span>
          </div>`).join('')}
        ${homeCoords?`<div class="rota-loja"><div class="rota-home">🏠</div><div><strong>Retorno para casa</strong></div></div>`:''}
      </div>
      <a href="${mapsUrl}" target="_blank" class="btn btn-secondary btn-full btn-sm">🗺️ Ver rota no Google Maps</a>
    </div>`;
  }

  // Supervisoras sem visitas mas com tipo de dia
  supsSemVisita.forEach(d=>{
    const sup=supervisoras.find(s=>s.id===d.supervisora_id);
    if(!sup) return;
    html+=`<div class="card" style="margin-bottom:14px;">
      <div class="sup-nome">${sup.nome}</div>
      <div class="sup-info">${d.supervisoras?.endereco_residencial||''}</div>
      <div style="margin-top:8px;">
        <span class="tipo-dia-badge ${TIPO_DIA[d.tipo]?.badge}">${TIPO_DIA[d.tipo]?.label}</span>
        ${d.descricao?`<div style="font-size:13px;color:var(--text-light);margin-top:6px;">${d.descricao}</div>`:''}
      </div>
    </div>`;
  });

  if(!html) html='<div class="empty"><div class="empty-icon">🗺️</div><p>Nenhuma rota encontrada para esta data</p></div>';
  el.innerHTML=html;
}

function gerarMapsUrl(sup,visits) {
  const homeAddr=encodeURIComponent((sup.endereco_residencial||'')+(sup.cidade_residencial?', '+sup.cidade_residencial:''));
  const waypoints=visits.map(v=>encodeURIComponent((v.lojas?.endereco||v.lojas?.nome||'')+', '+(v.lojas?.cidade||'')+', '+(v.lojas?.estado||''))).join('|');
  return `https://www.google.com/maps/dir/${homeAddr}/${waypoints}/${homeAddr}`;
}

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ==============================
// MÉTRICAS
// ==============================
async function carregarMetricas() {
  const mes=document.getElementById('met-mes').value;
  const supId=document.getElementById('met-sup').value;
  const ano=2026;
  const inicio=`${ano}-${String(mes).padStart(2,'0')}-01`;
  const fim=`${ano}-${String(mes).padStart(2,'0')}-31`;

  let qVis=db.from('visitas').select('*,supervisoras(nome,nome_curto),lojas(nome)').gte('data_visita',inicio).lte('data_visita',fim);
  if(supId) qVis=qVis.eq('supervisora_id',supId);
  const {data:visitas,error:errVis}=await qVis;
  if(errVis) console.error('Erro visitas:',errVis);

  const ids=(visitas||[]).map(v=>v.id);
  let regs=[];
  if(ids.length>0){
    const {data:regsData}=await db.from('registros_visita').select('categoria,visita_id').in('visita_id',ids);
    regs=regsData||[];
  }

  const {data:dias}=await db.from('dias_supervisora').select('tipo,supervisora_id,supervisoras(nome)').gte('data',inicio).lte('data',fim);

  const total=visitas?.length||0;
  const encerradas=visitas?.filter(v=>v.status==='encerrada').length||0;
  const mediaE=total>0?(visitas.reduce((s,v)=>s+(v.energia_time||0),0)/total).toFixed(1):'—';
  const totalR=regs?.length||0;

  document.getElementById('metrics-gerais').innerHTML=`
    <div class="metric-card"><div class="metric-num">${total}</div><div class="metric-label">Visitas realizadas</div></div>
    <div class="metric-card"><div class="metric-num">${encerradas}</div><div class="metric-label">Visitas encerradas</div></div>
    <div class="metric-card"><div class="metric-num">${mediaE}</div><div class="metric-label">Energia média</div></div>
    <div class="metric-card"><div class="metric-num">${totalR}</div><div class="metric-label">Total de registros</div></div>`;

  const porSup={};
  (visitas||[]).forEach(v=>{
    const n=v.supervisoras?.nome||'?';
    if(!porSup[n]) porSup[n]={visitas:0,soma:0,total:0};
    porSup[n].visitas++;
    if(v.energia_time){porSup[n].soma+=v.energia_time;porSup[n].total++;}
  });

  const barHtml=(entries,getValue,getLabel,cor)=>entries.sort((a,b)=>getValue(b[1])-getValue(a[1])).map(([nome,d])=>{
    const v=getValue(d),max=Math.max(...entries.map(([,x])=>getValue(x)),1),pct=v/max*100;
    return `<div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
        <span><strong>${nome.split(' ')[1]||nome}</strong></span><span style="font-weight:700;color:${cor};">${getLabel(d,v)}</span>
      </div>
      <div style="background:var(--border);border-radius:10px;height:8px;overflow:hidden;">
        <div style="width:${pct}%;background:${cor};height:100%;border-radius:10px;"></div>
      </div></div>`;
  }).join('')||'<p style="color:var(--text-light);">Sem dados</p>';

  document.getElementById('chart-visitas-sup').innerHTML=barHtml(Object.entries(porSup),d=>d.visitas,(d,v)=>`${v} visita${v!==1?'s':''}`,`var(--sfera)`);

  const energiaSup=Object.entries(porSup).filter(([,d])=>d.total>0).map(([n,d])=>[n,{...d,media:d.soma/d.total}]);
  document.getElementById('chart-energia').innerHTML=energiaSup.sort((a,b)=>b[1].media-a[1].media).map(([nome,d])=>{
    const pct=d.media/5*100,cor=pct>=70?'#28a745':pct>=50?'#ffc107':'#dc3545';
    return `<div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
        <span><strong>${nome.split(' ')[1]||nome}</strong></span><span style="color:${cor};font-weight:700;">${d.media.toFixed(1)} ★</span>
      </div>
      <div style="background:var(--border);border-radius:10px;height:8px;overflow:hidden;">
        <div style="width:${pct}%;background:${cor};height:100%;border-radius:10px;"></div>
      </div></div>`;
  }).join('')||'<p style="color:var(--text-light);">Sem dados</p>';

  const porCat={};
  (regs||[]).forEach(r=>{porCat[r.categoria]=(porCat[r.categoria]||0)+1;});
  const maxC=Math.max(...Object.values(porCat),1);
  document.getElementById('chart-categorias').innerHTML=Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([cat,n])=>`
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
        <span>${CAT_INFO[cat]||cat}</span><strong>${n}</strong>
      </div>
      <div style="background:var(--border);border-radius:10px;height:8px;overflow:hidden;">
        <div style="width:${n/maxC*100}%;background:var(--sfera);height:100%;border-radius:10px;"></div>
      </div></div>`).join('')||'<p style="color:var(--text-light);">Sem registros</p>';

  const porLoja={};
  (visitas||[]).forEach(v=>{const n=v.lojas?.nome||'—';if(!porLoja[n])porLoja[n]={soma:0,total:0};if(v.energia_time){porLoja[n].soma+=v.energia_time;porLoja[n].total++;}});
  document.getElementById('chart-energia-loja').innerHTML=Object.entries(porLoja).filter(([,d])=>d.total>0).map(([nome,d])=>{
    const m=(d.soma/d.total).toFixed(1),pct=d.soma/d.total/5*100,cor=pct>=70?'#28a745':pct>=50?'#ffc107':'#dc3545';
    const em=ENERGIA_INFO[Math.round(d.soma/d.total)]?.emoji||'—';
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:20px;">${em}</span>
      <div style="flex:1;"><div style="font-size:13px;font-weight:700;">${nome}</div>
        <div style="background:var(--border);border-radius:10px;height:6px;margin-top:4px;overflow:hidden;">
          <div style="width:${pct}%;background:${cor};height:100%;border-radius:10px;"></div></div></div>
      <span style="font-weight:800;color:${cor};">${m}</span></div>`;
  }).join('')||'<p style="color:var(--text-light);">Sem dados</p>';

  // Tipo de dia
  const porTipo={visitas:0,escritorio:0,demanda:0};
  (dias||[]).forEach(d=>{if(porTipo[d.tipo]!==undefined)porTipo[d.tipo]++;});
  const totalDias=Object.values(porTipo).reduce((a,b)=>a+b,0)||1;
  document.getElementById('chart-tipo-dia').innerHTML=Object.entries(porTipo).map(([tipo,n])=>`
    <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:20px;">${tipo==='visitas'?'🏪':tipo==='escritorio'?'🏢':'📋'}</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;">${TIPO_DIA[tipo]?.label.split(' ').slice(1).join(' ')}</div>
        <div style="background:var(--border);border-radius:10px;height:6px;margin-top:4px;overflow:hidden;">
          <div style="width:${n/totalDias*100}%;background:var(--sfera);height:100%;border-radius:10px;"></div></div>
      </div><strong>${n} dia${n!==1?'s':''}</strong></div>`).join('');
}

// ==============================
// CHECKLISTS
// ==============================
async function carregarChecklists() {
  const {data}=await db.from('checklist_templates').select('*,checklist_itens(*)').order('created_at',{ascending:false});
  const el=document.getElementById('lista-checklists');
  if(!data||data.length===0){el.innerHTML='<div class="empty"><div class="empty-icon">☑️</div><p>Nenhum checklist ainda</p></div>';return;}
  el.innerHTML=data.map(t=>`
    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><div style="font-weight:700;font-size:16px;">${t.titulo}</div>
        <div style="font-size:12px;color:var(--sfera-dark);margin-top:4px;">${t.checklist_itens?.length||0} itens</div></div>
        <button class="btn btn-danger btn-sm" onclick="deletarChecklist('${t.id}')">Excluir</button>
      </div>
      <hr class="divider">
      ${(t.checklist_itens||[]).sort((a,b)=>a.ordem-b.ordem).map((item,i)=>`<div style="font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);">${i+1}. ${item.pergunta}</div>`).join('')}
    </div>`).join('');
}

function abrirNovoChecklist(){document.getElementById('modal-novo-cl').style.display='';}
function fecharNovoChecklist(){document.getElementById('modal-novo-cl').style.display='none';}

async function salvarNovoChecklist() {
  const titulo=document.getElementById('cl-titulo').value.trim();
  const itensRaw=document.getElementById('cl-itens').value.trim();
  if(!titulo||!itensRaw){showToast('Preencha título e itens','error');return;}
  const {data:tmpl}=await db.from('checklist_templates').insert({titulo}).select().single();
  const itens=itensRaw.split('\n').filter(Boolean).map((p,i)=>({template_id:tmpl.id,ordem:i+1,pergunta:p.trim()}));
  await db.from('checklist_itens').insert(itens);
  document.getElementById('cl-titulo').value='';
  document.getElementById('cl-itens').value='';
  fecharNovoChecklist();
  carregarChecklists();
  showToast('Checklist criado!','success');
}

async function deletarChecklist(id) {
  if(!confirm('Excluir este checklist?')) return;
  await db.from('checklist_templates').delete().eq('id',id);
  carregarChecklists();
}

// UTILS

function formatData(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}
function formatHora(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function showToast(msg,tipo=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+tipo;setTimeout(()=>t.className='toast',2500);}
function logout(){sessionStorage.clear();window.location.href='index.html';}
